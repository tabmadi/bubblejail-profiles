# Google Chrome
dot_desktop_path = [
    "/usr/share/applications/google-chrome.desktop",
    "/usr/share/applications/com.google.Chrome.desktop",
]
description='''
Google Chrome web browser.
'''

import_tips='''
Move .config/google-chrome folder from your home directory in to instance
home directory.
'''

[services.common]
executable_name = "/usr/bin/google-chrome-stable"
[services.x11]
[services.network]
[services.pulse_audio]
[services.notify]
[services.direct_rendering]
[services.home_share]
home_paths = ["Downloads",]
[services.mpris]
player_name = "chrome.*"
