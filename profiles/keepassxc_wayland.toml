# KeePassXC on Wayland
dot_desktop_path = [
    "/usr/share/applications/org.keepassxc.KeePassXC.desktop",
]
description='''
KeePassXC using wayland display protocol.
'''

import_tips='''
Move .config/keepassxc folder and your KeePass database file from your home
directory in to instance home directory.
'''

[services.common]
executable_name = "/usr/bin/keepassxc"
executable_args = ["-platform", "wayland",]
[services.wayland]
[services.network]
[services.notify]
[services.direct_rendering]
