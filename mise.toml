[tools]
lefthook = "2.0.11"
cocogitto = "6.5.0"
act = "0.2.83"

[tasks.setup]
run = "lefthook install"

[tasks.format]
run = "echo 'Ok'"

[tasks.lint]
run = "echo 'Ok'"

[tasks.test]
run = "echo 'Ok'"

[tasks.check]
depends = ["format", "lint", "test"]

[tasks.pre-commit]
depends = ["format", "lint"]

[tasks.act]
run = "act pull_request --secret-file .env -e .github/act/pull_request.json -j checks"
